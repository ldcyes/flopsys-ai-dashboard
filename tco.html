<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TCO - Flopsys AI</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-left">
            <div class="logo" data-lang="logo">Flopsys AI</div>
            <div class="nav-links">
                <a href="index.html" class="nav-link" data-lang="performance">Overview</a>
                <a href="leaderboard.html" class="nav-link" data-lang="leaderboard">Hardware Ranking</a>
                <a href="tco.html" class="nav-link active" data-lang="tco">TCO</a>
                <a href="expert_fc_utilization.html" class="nav-link">Expert FC Utilization</a>
                <a href="author.html" class="nav-link">Author</a>
            </div>
        </div>
        <div class="nav-right">
            <select class="lang-select" id="lang-select">
                <option value="zh">🇨🇳 中文</option>
                <option value="en" selected>🇺🇸 English</option>
                <option value="es">🇪🇸 Español</option>
                <option value="fr">🇫🇷 Français</option>
            </select>
        </div>
    </nav>

    <div class="container">
        <div class="header">
            <h1 data-lang="tco-title">TCO</h1>
            <p data-lang="tco-subtitle">Select one model, machine, and input/output length to find the best current configuration.</p>
        </div>

        <div class="main-content">
            <!-- 配置输入区 -->
            <section class="controls-section">
                <div class="section-title" data-lang="config-input">TCO Inputs</div>
                <div class="tco-input-grid">
                    <div class="control-group">
                        <label for="tco-model-select" data-lang="model">模型选择</label>
                        <select id="tco-model-select">
                            <option value="" data-lang="select-model">请选择模型</option>
                        </select>
                    </div>

                    <div class="control-group">
                        <label for="tco-seq-select" data-lang="seq-length">序列长度</label>
                        <select id="tco-seq-select"></select>
                    </div>

                    <div class="control-group">
                        <label for="tco-gpu-select" data-lang="tco-gpu">Machine</label>
                        <select id="tco-gpu-select">
                            <option value="" data-lang="tco-select-gpu">Select machine</option>
                        </select>
                    </div>

                    <div class="control-group">
                        <label for="card-price-input" data-lang="card-price">Price ($/GPU-hour)</label>
                        <input type="number" id="card-price-input" placeholder="3.00" step="0.01">
                    </div>
                </div>
                
                <div class="button-group">
                    <button class="btn btn-primary" id="calculate-tco-btn" data-lang="calculate">Find Best Config</button>
                </div>
            </section>

            <!-- 结果展示区 -->
            <section class="results-section">
                <div class="section-title" data-lang="optimal-config">Best Configuration</div>
                <div class="results-grid" id="tco-results">
                    <div class="result-card empty-state" data-lang="no-calculation">
                        Loading default best configuration...
                    </div>
                </div>
            </section>
        </div>
    </div>

    <script type="module" src="js/site-context.js"></script>
    <script type="module" src="js/i18n.js"></script>
    <script type="module" src="js/data.js"></script>
    <script type="module" src="js/tco.js?v=20260613-strategy-payload-tco"></script>
    <script type="module">
        import { updateLanguage } from './js/i18n.js';

        const select = document.getElementById('lang-select');
        if (select) {
            select.addEventListener('change', (e) => {
                updateLanguage(e.target.value);
            });
        }
        // 初始化语言为英文
        updateLanguage('en');
    </script>
</body>
</html>
